# /etc/nginx/sites-available/busyq
# Symlink to enable: ln -s /etc/nginx/sites-available/busyq /etc/nginx/sites-enabled/busyq
#
# BusyQ runs inside a Docker container at 172.17.0.2:3000.
# Nginx listens on 8081, proxies to the container.

server {
    listen 8081;
    server_name busyq.local _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://172.17.0.2:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    location /_next/static {
        proxy_pass http://172.17.0.2:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location ~ ^/(manifest\.json|icon-.*\.png)$ {
        proxy_pass http://172.17.0.2:3000;
        add_header Cache-Control "public, max-age=86400";
    }
}
